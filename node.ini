[binaries]
c = 'emcc'
cpp = 'em++'
ld = 'wasm-ld'
ar = 'emar'
ranlib = 'emranlib'
exe_wrapper = 'node'
pkgconfig = ['emconfigure', 'env', 'PKG_CONFIG_LIBDIR=/usr/local/wasm32/lib/pkgconfig', 'pkg-config']

[host_machine]
system = 'emscripten'
cpu_family = 'wasm32'
cpu = 'wasm32'
endian = 'little'

[built-in options]
c_std = 'c99'

[project options]
build_tests = true
debug = false
